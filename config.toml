# drugtargets pipeline configuration — pinned versions (single source of truth)
# Values here are written into meta.json and the data-dir name (v2026Q2).

[release]
data_dir = "v2026Q2"          # web/public/data/<data_dir>/
build_label = "2026Q2"

[opentargets]
release = "26.03"
base_url = "https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/26.03/output"
# Datasets verified to exist in 26.03 /output/ (known_drug retired; clinical_indication added).
datasets = [
  "drug_molecule",
  "drug_mechanism_of_action",
  "clinical_indication",
  "target",
  "disease",
]
license = "CC0 1.0"

[openfda]
# openFDA bulk JSON (US-gov public domain). Manifest lists partitioned zips.
manifest_url = "https://api.fda.gov/download.json"
# pharm_class is sourced from the NDC directory (better openfda.pharm_class_* coverage,
# keyed by openfda.unii). Approval status/dates come from Drugs@FDA (drugsfda submissions).
# The large SPL drug/label set is intentionally excluded for size; some approved drugs
# (e.g. imatinib) therefore have no openFDA pharm_class.
ndc_endpoint = "drug/ndc"        # pharm_class_epc/_moa/_pe keyed by unii
ndc_date = "2026-06-19"          # drug-ndc export_date
endpoint = "drug/drugsfda"       # approvals (submission_status AP) + dates
date = "2026-06-19"              # drugsfda export_date recorded in meta.json
# Join to ChEMBL is by UNII via UniChem, rolled salt->parent via OT parentId (see Methods).
disclaimer = "openFDA is a beta research project and not for clinical use."
license = "U.S. Public Domain"

[hgnc]
# HGNC complete set: symbol <-> ensembl_gene_id <-> uniprot_ids (+ alias/prev symbols).
url = "https://storage.googleapis.com/public-download-files/hgnc/tsv/tsv/hgnc_complete_set.txt"
version = "2026-06"
license = "CC0 1.0"

[chembl]
version = "35"
license = "CC BY-SA 3.0"

[iuphar]
# Guide to Pharmacology (IUPHAR/BPS) — curated ligand-target interactions WITH direction.
# Additive signed drug-target edges; join by ligand ChEMBL id + Target Ensembl Gene ID.
version = "2026.2"
interactions_url = "https://www.guidetopharmacology.org/DATA/interactions.csv"
ligands_url = "https://www.guidetopharmacology.org/DATA/ligands.csv"
license = "CC BY-SA 4.0"

[drugcentral]
# WHO ATC classification + ChEMBL crosswalk (global; covers drugs openFDA EPC/MoA never will,
# e.g. imatinib -> L01EA01). Streamed Postgres dump (struct2atc + atc + identifier tables) —
# CI-friendly (no 25GB ChEMBL SQLite, which won't fit GitHub Actions runners).
version = "2023-11-01"
dump_url = "https://unmtid-shinyapps.net/download/drugcentral.dump.11012023.sql.gz"
license = "CC BY-SA 4.0"

[unichem]
# UNII -> ChEMBL crosswalk via UniChem whole-source bulk mapping (matched by InChIKey).
# src_id 1 = chembl, src_id 14 = fdasrs (FDA/USP Substance Registration System = UNII).
api_url = "https://www.ebi.ac.uk/unichem/api/v1/compounds"
chembl_src_id = 1
fdasrs_src_id = 14
mapping_url = "https://ftp.ebi.ac.uk/pub/databases/chembl/UniChem/data/wholeSourceMapping/src_id1/src1src14.txt.gz"
